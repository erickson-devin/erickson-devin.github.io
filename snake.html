<!DOCTYPE HTML>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>Snake Game | Devin Erickson</title>
    <meta name="description" content="A classic Snake game built with HTML5 Canvas and vanilla JavaScript.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0a0f1e;
        color: #e2e8f0;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 24px;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #1e293b;
      }
      header img {
        width: 44px; height: 44px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #6366f1;
      }
      header h1 { font-size: 1rem; font-weight: 700; color: #fff; }
      header nav a {
        margin-left: 20px;
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.85rem;
        transition: color 0.2s;
      }
      header nav a:hover { color: #818cf8; }

      /* ── Main ── */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 16px 60px;
        gap: 24px;
      }

      .game-title {
        text-align: center;
      }
      .game-title h2 {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #818cf8, #34d399);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .game-title p {
        margin-top: 6px;
        color: #64748b;
        font-size: 0.85rem;
      }

      /* ── HUD ── */
      .hud {
        display: flex;
        gap: 32px;
        font-family: 'JetBrains Mono', monospace;
      }
      .hud-item { text-align: center; }
      .hud-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: #475569; }
      .hud-value { font-size: 1.6rem; font-weight: 700; color: #fff; }
      #score-display  { color: #34d399; }
      #best-display   { color: #f59e0b; }

      /* ── Canvas wrapper ── */
      .canvas-wrapper {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid #1e293b;
        box-shadow: 0 0 60px rgba(99, 102, 241, 0.15);
      }
      #gc { display: block; }

      /* ── Overlay ── */
      #overlay {
        position: absolute;
        inset: 0;
        background: rgba(10, 15, 30, 0.88);
        backdrop-filter: blur(4px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        transition: opacity 0.3s;
      }
      #overlay.hidden { display: none; }
      #overlay-title {
        font-size: 1.8rem;
        font-weight: 800;
        color: #fff;
        text-align: center;
      }
      #overlay-sub {
        color: #64748b;
        font-size: 0.85rem;
        text-align: center;
      }
      #start-btn {
        padding: 12px 32px;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        box-shadow: 0 4px 24px rgba(99,102,241,0.4);
      }
      #start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,0.5); }
      #start-btn:active { transform: translateY(0); }
      #final-score-line {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1rem;
        color: #34d399;
      }

      /* ── D-pad (mobile) ── */
      .dpad {
        display: grid;
        grid-template-areas:
          ". up ."
          "left . right"
          ". down .";
        gap: 6px;
      }
      .dpad button {
        width: 52px; height: 52px;
        background: rgba(30,41,59,0.9);
        border: 1px solid #334155;
        border-radius: 10px;
        color: #94a3b8;
        font-size: 1.2rem;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        display: flex; align-items: center; justify-content: center;
      }
      .dpad button:active { background: #4f46e5; color: #fff; transform: scale(0.92); }
      #btn-up    { grid-area: up; }
      #btn-left  { grid-area: left; }
      #btn-right { grid-area: right; }
      #btn-down  { grid-area: down; }

      /* ── Legend ── */
      .legend {
        font-size: 0.75rem;
        color: #475569;
        display: flex;
        gap: 20px;
      }
      .legend span { display: flex; align-items: center; gap: 6px; }
      .dot { width: 10px; height: 10px; border-radius: 3px; }
      .dot-snake { background: #34d399; }
      .dot-head  { background: #6ee7b7; }
      .dot-food  { background: #f87171; }

      /* ── Footer ── */
      footer {
        text-align: center;
        padding: 20px;
        color: #334155;
        font-size: 0.75rem;
        border-top: 1px solid #1e293b;
      }
      footer a { color: #475569; text-decoration: none; }
      footer a:hover { color: #94a3b8; }
    </style>
  </head>

  <body>
    <header>
      <img src="assets/Erickson_Fam_2017.jpg" alt="Devin Erickson">
      <h1>Devin Erickson</h1>
      <nav>
        <a href="index.html">Home</a>
      </nav>
    </header>

    <main>
      <div class="game-title">
        <h2>🐍 Snake</h2>
        <p>Use arrow keys or the d-pad below — don't eat yourself!</p>
      </div>

      <!-- HUD -->
      <div class="hud">
        <div class="hud-item">
          <div class="hud-label">Score</div>
          <div class="hud-value" id="score-display">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">Best</div>
          <div class="hud-value" id="best-display">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">Length</div>
          <div class="hud-value" id="length-display">5</div>
        </div>
      </div>

      <!-- Canvas -->
      <div class="canvas-wrapper">
        <canvas id="gc" width="400" height="400"></canvas>
        <div id="overlay">
          <div id="overlay-title">🐍 Snake</div>
          <div id="overlay-sub">Press Start or use arrow keys to begin</div>
          <div id="final-score-line" style="display:none"></div>
          <button id="start-btn">Start Game</button>
        </div>
      </div>

      <!-- D-pad -->
      <div class="dpad" aria-label="Direction controls">
        <button id="btn-up"    aria-label="Up">▲</button>
        <button id="btn-left"  aria-label="Left">◀</button>
        <button id="btn-right" aria-label="Right">▶</button>
        <button id="btn-down"  aria-label="Down">▼</button>
      </div>

      <!-- Legend -->
      <div class="legend">
        <span><span class="dot dot-head"></span>Head</span>
        <span><span class="dot dot-snake"></span>Body</span>
        <span><span class="dot dot-food"></span>Food</span>
      </div>
    </main>

    <footer>
      <p>Devin Erickson &copy;2018 &mdash; <a href="http://erickson-devin.github.io">DevinErickson.com</a></p>
    </footer>

    <script>
    (function () {
      'use strict';

      /* ── Constants ── */
      const COLS     = 20;
      const ROWS     = 20;
      const CELL     = 20;          // px per cell
      const FPS      = 10;          // ticks / second
      const START_LEN = 5;

      /* ── State ── */
      let snake, dir, nextDir, food, score, best, gameLoop, running;

      /* ── DOM refs ── */
      const canvas      = document.getElementById('gc');
      const ctx         = canvas.getContext('2d');
      const overlay     = document.getElementById('overlay');
      const overlayTitle= document.getElementById('overlay-title');
      const overlaySub  = document.getElementById('overlay-sub');
      const finalLine   = document.getElementById('final-score-line');
      const startBtn    = document.getElementById('start-btn');
      const scoreEl     = document.getElementById('score-display');
      const bestEl      = document.getElementById('best-display');
      const lengthEl    = document.getElementById('length-display');

      /* ── Persist best score ── */
      best = parseInt(localStorage.getItem('snake-best') || '0', 10);
      bestEl.textContent = best;

      /* ── Init / Reset ── */
      function init() {
        // Snake starts in the middle moving right
        const midR = Math.floor(ROWS / 2);
        const midC = Math.floor(COLS / 2);
        snake = [];
        for (let i = START_LEN - 1; i >= 0; i--) {
          snake.push({ x: midC - i, y: midR });
        }
        dir     = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score   = 0;
        scoreEl.textContent  = 0;
        lengthEl.textContent = START_LEN;
        placeFood();
      }

      function placeFood() {
        let pos;
        do {
          pos = {
            x: Math.floor(Math.random() * COLS),
            y: Math.floor(Math.random() * ROWS),
          };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        food = pos;
      }

      /* ── Tick ── */
      function tick() {
        dir = nextDir;
        const head = {
          x: (snake[snake.length - 1].x + dir.x + COLS) % COLS,
          y: (snake[snake.length - 1].y + dir.y + ROWS) % ROWS,
        };

        // Self-collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
          endGame();
          return;
        }

        snake.push(head);

        if (head.x === food.x && head.y === food.y) {
          // Eat food
          score += 10;
          scoreEl.textContent  = score;
          lengthEl.textContent = snake.length;
          if (score > best) {
            best = score;
            bestEl.textContent = best;
            localStorage.setItem('snake-best', best);
          }
          placeFood();
        } else {
          snake.shift(); // remove tail
        }

        draw();
      }

      /* ── Draw ── */
      function draw() {
        const W = canvas.width;
        const H = canvas.height;

        // Background
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, W, H);

        // Grid lines (subtle)
        ctx.strokeStyle = 'rgba(30,41,59,0.5)';
        ctx.lineWidth = 0.5;
        for (let c = 0; c <= COLS; c++) {
          ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke();
        }
        for (let r = 0; r <= ROWS; r++) {
          ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke();
        }

        // Snake body
        snake.forEach((seg, i) => {
          const isHead = i === snake.length - 1;
          if (isHead) {
            ctx.fillStyle = '#6ee7b7';   // bright head
          } else {
            // Gradient from tail (dim) to neck (bright)
            const t = i / (snake.length - 1);
            const g = Math.round(160 + t * 75);
            ctx.fillStyle = `rgb(0,${g},100)`;
          }
          const x = seg.x * CELL + 1;
          const y = seg.y * CELL + 1;
          const s = CELL - 2;
          roundRect(ctx, x, y, s, s, isHead ? 5 : 3);
          ctx.fill();
        });

        // Food (glowing red circle)
        const fx = food.x * CELL + CELL / 2;
        const fy = food.y * CELL + CELL / 2;
        ctx.shadowColor = '#f87171';
        ctx.shadowBlur  = 10;
        ctx.fillStyle   = '#f87171';
        ctx.beginPath();
        ctx.arc(fx, fy, (CELL - 4) / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur  = 0;
      }

      /* ── Helpers ── */
      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      /* ── Start / End ── */
      function startGame() {
        init();
        overlay.classList.add('hidden');
        running = true;
        draw();
        gameLoop = setInterval(tick, 1000 / FPS);
      }

      function endGame() {
        clearInterval(gameLoop);
        running = false;
        overlay.classList.remove('hidden');
        overlayTitle.textContent = '💀 Game Over';
        overlaySub.textContent   = '';
        finalLine.style.display  = 'block';
        finalLine.textContent    = `Score: ${score}  •  Best: ${best}`;
        startBtn.textContent     = 'Play Again';
      }

      /* ── Input ── */
      document.addEventListener('keydown', e => {
        // Start on first arrow key if on overlay
        if (!running && [37,38,39,40].includes(e.keyCode)) {
          startGame();
          return;
        }
        switch (e.keyCode) {
          case 37: if (dir.x !== 1)  nextDir = { x:-1, y: 0 }; e.preventDefault(); break;
          case 38: if (dir.y !== 1)  nextDir = { x: 0, y:-1 }; e.preventDefault(); break;
          case 39: if (dir.x !== -1) nextDir = { x: 1, y: 0 }; e.preventDefault(); break;
          case 40: if (dir.y !== -1) nextDir = { x: 0, y: 1 }; e.preventDefault(); break;
        }
      });

      startBtn.addEventListener('click', startGame);

      // D-pad buttons
      document.getElementById('btn-up').addEventListener('click',    () => { if (dir.y !== 1)  nextDir = { x: 0, y:-1 }; if (!running) startGame(); });
      document.getElementById('btn-down').addEventListener('click',  () => { if (dir.y !== -1) nextDir = { x: 0, y: 1 }; if (!running) startGame(); });
      document.getElementById('btn-left').addEventListener('click',  () => { if (dir.x !== 1)  nextDir = { x:-1, y: 0 }; if (!running) startGame(); });
      document.getElementById('btn-right').addEventListener('click', () => { if (dir.x !== -1) nextDir = { x: 1, y: 0 }; if (!running) startGame(); });

      // Draw initial idle frame
      init();
      draw();
    })();
    </script>
  </body>
</html>
